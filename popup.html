<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Audio Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Set volume</h1>

    <!-- Indicador de pestañas con audio -->
    <div id="audio-indicator" class="audio-indicator">
        <div class="indicator-header">
            <span class="indicator-title">Tabs with audio</span>
        </div>
        <div id="audio-tabs-list" class="audio-tabs-list">
            <div class="no-audio-message">No tabs are playing audio</div>
        </div>
    </div>

    <div class="audio-source">
        <label for="volume-range">Volume Control</label>
        <h4>100%</h4>
        <input class="range-style" type="range" id="volume-range" min="0" max="1" step="0.1" value="1">
        <button id="mute-btn" class="mute-button">
            <span class="mute-icon">🔊</span>
            <span class="mute-text">Mute</span>
        </button>
    </div>
    <div class="shortcuts-info">
        <p class="shortcuts-title">Keyboard Shortcuts</p>
        <div class="shortcut-item">
            <span class="shortcut-key">Ctrl + M</span>
            <span class="shortcut-desc">Mute/Unmute</span>
        </div>
        <div class="shortcut-item">
            <span class="shortcut-key">Ctrl + Shift + ↑</span>
            <span class="shortcut-desc">Increase Volume</span>
        </div>
        <div class="shortcut-item">
            <span class="shortcut-key">Ctrl + Shift + ↓</span>
            <span class="shortcut-desc">Decrease Volume</span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
