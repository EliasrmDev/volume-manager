<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Audio Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Set volume</h1>
    <div class="audio-source">
        <label for="volume-range">Volume:</label>
        <input class="range-style" type="range" id="volume-range" min="0" max="1" step="0.1" value="1">
        <h4>100%</h4>
        <button id="mute-btn" class="mute-button">
            <span class="mute-icon">🔊</span>
            <span class="mute-text">Mute</span>
        </button>
    </div>
    <div class="shortcuts-info">
        <p class="shortcuts-title">Atajos de teclado:</p>
        <div class="shortcut-item">
            <span class="shortcut-key">Ctrl + M</span>
            <span class="shortcut-desc">Mute/Unmute</span>
        </div>
        <div class="shortcut-item">
            <span class="shortcut-key">Ctrl + Shift + ↑</span>
            <span class="shortcut-desc">Subir volumen</span>
        </div>
        <div class="shortcut-item">
            <span class="shortcut-key">Ctrl + Shift + ↓</span>
            <span class="shortcut-desc">Bajar volumen</span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
